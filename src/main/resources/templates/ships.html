<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список судов</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="mb-4">🚢 Флот компании</h1>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>Название</th>
                    <th>MMSI</th>
                    <th>Тип</th>
                    <th>Действие</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="ship : ${ships}">
                    <td th:text="${ship.name}">Test Ship</td>
                    <td th:text="${ship.mmsi}">123456789</td>
                    <td th:text="${ship.shipType}">Cargo</td>
                    <td>
                        <a th:href="@{'/ship/' + ${ship.id}}" class="btn btn-primary btn-sm">
                            Мониторинг
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>
</div>

</body>
</html>
